name: harness

on:
  push:
    branches: [main]
  pull_request:

# WARN vira FAIL no CI: o harness é estrito aqui.
env:
  HARNESS_STRICT: "1"
  HARNESS_BASE: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD~1' }}

jobs:
  # Descobre quais trilhas precisam rodar, evitando CI inútil.
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.f.outputs.rust }}
      angular: ${{ steps.f.outputs.angular }}
    steps:
      - uses: actions/checkout@v4
      - id: f
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'src-tauri/**'
              - 'Cargo.*'
              - 'rustfmt.toml'
              - 'clippy.toml'
            angular:
              - 'src/**'
              - 'angular.json'
              - 'tsconfig*.json'
              - 'package*.json'
              - 'eslint.config.js'
              - '.prettierrc.json'

  # Conventional Commits + validação de specs + drift. Sempre roda.
  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - name: Conventional Commits
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx commitlint --from "origin/${{ github.base_ref }}" --to HEAD --verbose
          else
            npx commitlint --last --verbose
          fi
      - name: OpenSpec validate
        run: bash .harness/gates/openspec-validate.sh
      - name: Spec drift
        run: bash .harness/verifiers/spec-drift.sh

  rust:
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt, clippy, llvm-tools-preview }
      - uses: Swatinem/rust-cache@v2
      - name: Dependências do Tauri (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: cargo install cargo-llvm-cov || true
      - name: Fronteiras arquiteturais
        run: bash .harness/verifiers/arch-boundaries.sh
      - name: Pureza do stem-core
        run: bash .harness/verifiers/core-purity.sh
      - name: Casca fina do Tauri
        run: bash .harness/verifiers/tauri-thin.sh
      - run: bash .harness/gates/rust-fmt.sh
      - run: bash .harness/gates/rust-clippy.sh
      - run: bash .harness/gates/rust-test.sh
      - run: bash .harness/gates/rust-coverage.sh

  angular:
    needs: changes
    if: ${{ needs.changes.outputs.angular == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - name: Angular só apresenta
        run: bash .harness/verifiers/angular-presentation.sh
      - run: bash .harness/gates/angular-format.sh
      - run: bash .harness/gates/angular-lint.sh
      - run: bash .harness/gates/angular-build.sh
