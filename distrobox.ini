# =============================================================================
#  distrobox.ini  -  Ambiente de desenvolvimento Rust (Arch Linux)
#
#  Criar/atualizar (Host):       distrobox assemble create --file distrobox.ini
#  Entrar (Host):                distrobox enter stem-player
#  Pós instalação (Container):   bash .harness/install.sh
#  Remover (Host):               distrobox rm stem-player
# =============================================================================

[stem-player]

# --- Imagem base -------------------------------------------------------------
image=quay.io/toolbx/arch-toolbox:latest
pull=true            # sempre busca a camada mais recente da imagem ao (re)criar
replace=false        # 'true' (ou flag --replace) reconstroi o container do zero
start_now=true       # inicia o container logo apos o assemble
entry=true           # adiciona entrada no menu de aplicativos do host
init=false           # comportamento padrao do distrobox (sem systemd interno)

# --- GPU (opcional) ----------------------------------------------------------
nvidia=false         # mude para 'true' se usa o driver proprietario NVIDIA

# --- HOME --------------------------------------------------------------------
# Por padrao o $HOME e COMPARTILHADO com o host (~/.cargo e ~/.rustup tambem).
# Para garantir as permissões corretas crie a pasta antes de criar container: mkdir -p ~/.distrobox-homes/stem-player
home=~/.distrobox-homes/stem-player

# --- Pacotes do sistema (pacman) ---------------------------------------------
additional_packages="git vi less curl wget file"
additional_packages="alsa-lib pkgconf base-devel"
additional_packages="rust rust-src rustup nodejs npm code"
additional_packages="webkit2gtk-4.1 openssl librsvg libappindicator-gtk3"

additional_packages="fish starship"
pre_init_hooks="export SHELL=/usr/bin/fish;"

