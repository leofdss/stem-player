# =============================================================================
#  distrobox.ini  -  Ambiente de desenvolvimento Rust (Arch Linux)
#
#  Criar/atualizar:   distrobox assemble create --file distrobox.ini
#  Entrar:            distrobox enter stem-player
#  Recriar do zero:   distrobox assemble create --replace --file distrobox.ini
#  Remover:           distrobox rm stem-player
# =============================================================================

[stem-player]

# --- Imagem base -------------------------------------------------------------
image=quay.io/toolbx/arch-toolbox:latest
pull=true            # sempre busca a camada mais recente da imagem ao (re)criar
replace=false        # 'true' (ou flag --replace) reconstroi o container do zero
start_now=true       # inicia o container logo apos o assemble
entry=true           # adiciona entrada no menu de aplicativos do host
init=false           # comportamento padrao do distrobox (sem systemd interno)

# --- GPU (opcional) ----------------------------------------------------------
nvidia=false         # mude para 'true' se usa o driver proprietario NVIDIA

# --- HOME --------------------------------------------------------------------
# Por padrao o $HOME e COMPARTILHADO com o host (~/.cargo e ~/.rustup tambem).
home=~/.local/share/distrobox/stem-player

# --- Pacotes do sistema (pacman) ---------------------------------------------
# Bloco multilinha com """ e seguro APENAS para listas de pacotes.
additional_packages="""
  base-devel git lazygit github-cli openssh vi
  curl wget unzip which jq man-db man-pages
  rustup sccache lld mold clang llvm
  pkgconf openssl zlib postgresql-libs sqlite
  cmake ninja python python-pip
  gdb lldb valgrind strace
  neovim helix tmux
  ripgrep fd bat eza fzf zoxide starship
"""

# --- Provisionamento (executado na criacao do container) ---------------------
# IMPORTANTE: o distrobox-assemble NAO processa init_hooks multilinha de forma
# confiavel (quebra com '\' e com a indentacao). Por isso o hook fica em UMA
# unica linha, com os comandos separados por ';'. O arquivo-sentinela ($S)
# garante que a configuracao do Rust rode apenas uma vez.
init_hooks=ME="$(getent passwd 1000 | cut -d: -f1)"; [ -n "$ME" ] || ME="$(id -un)"; su - "$ME" -c 'set -e; export PATH="$HOME/.cargo/bin:$PATH"; S="$HOME/.local/state/rust-dev.provisioned"; if [ ! -f "$S" ]; then rustup default stable; rustup component add rust-src rust-analyzer clippy rustfmt; rustup target add wasm32-unknown-unknown; cargo install --locked cargo-binstall; cargo binstall -y --locked cargo-nextest cargo-watch cargo-edit cargo-audit cargo-deny cargo-outdated bacon; mkdir -p "$(dirname "$S")"; touch "$S"; fi'